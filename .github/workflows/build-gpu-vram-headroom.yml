name: Build GPU VRAM Headroom Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-gpu-vram-headroom.yml"
      - "images/gpu-vram-headroom/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute short SHA
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gpu-vram-headroom
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: images/gpu-vram-headroom
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
