replicaCount: 1

config:
  inCluster: true
  inClusterContextName: "wavey-us-ord"
  enableHelm: true

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  ingressClassName: haproxy
  annotations:
    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: headlamp-basic-auth
    haproxy.org/auth-realm: "Wavey Kubernetes Admin"
    haproxy.org/ssl-redirect: "true"
  hosts:
    - host: k8s-us-ord.wavey.io
      paths:
        - path: /
          type: Prefix
  tls:
    - secretName: headlamp-tls
      hosts:
        - k8s-us-ord.wavey.io

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  wavey.ai/ingress: "true"
