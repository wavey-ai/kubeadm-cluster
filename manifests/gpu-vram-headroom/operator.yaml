apiVersion: v1
kind: Namespace
metadata:
  name: wavey-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-vram-headroom
  namespace: wavey-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-vram-headroom
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-vram-headroom
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-vram-headroom
subjects:
  - kind: ServiceAccount
    name: gpu-vram-headroom
    namespace: wavey-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-vram-headroom
  namespace: wavey-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-vram-headroom
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-vram-headroom
    spec:
      serviceAccountName: gpu-vram-headroom
      imagePullSecrets:
        - name: ghcr-wavey-ai
      hostPID: true
      nodeSelector:
        wavey.ai/gpu: "true"
      tolerations:
        - key: wavey.ai/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: operator
          image: ghcr.io/wavey-ai/gpu-vram-headroom:main
          imagePullPolicy: Always
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POLL_INTERVAL_SECONDS
              value: "15"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
