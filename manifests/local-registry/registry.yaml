apiVersion: v1
kind: Namespace
metadata:
  name: wavey-system
---
apiVersion: v1
kind: Service
metadata:
  name: local-registry
  namespace: wavey-system
spec:
  selector:
    app.kubernetes.io/name: local-registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-registry
  namespace: wavey-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: local-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-registry
    spec:
      nodeSelector:
        wavey.ai/node-role: cpu
      containers:
        - name: registry
          image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              hostPort: 5000
              name: registry
          env:
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          readinessProbe:
            tcpSocket:
              port: registry
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          hostPath:
            path: /var/lib/local-registry
            type: DirectoryOrCreate
